<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <!-- บังคับให้หน้าเว็บปรับขนาดตามหน้าจอมือถือทุกรุ่น -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Red Zone App - Safety Map (Mobile Friendly)</title>
    
    
    <!-- เรียกใช้ระบบแผนที่ Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { 
            font-family: Tahoma, "Segoe UI", sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: row; 
            height: 100vh; 
            background: #12051f; 
            color: rgba(255,255,255,0.92); 
            overflow: hidden;
        }
        /* 🔥 แก้บัคหน้าจอไหลบนมือถือ: ดักจับไม่ให้ SweetAlert2 มาปลดล็อกความสูงหน้าเว็บ */
        html.swal2-height-auto, body.swal2-height-auto {
            height: 100vh !important;
            overflow: hidden !important;
        }

        .swal2-container {
            z-index: 10000 !important;
        }   
        /* ==========================================================================
        💻 โครงสร้างหน้าจอคอมพิวเตอร์ (Desktop First)
        ========================================================================== */
        /* ยุบรวมคลาส sidebar ทั้งหมด ป้องกันการซ้ำซ้อน */
        .sidebar-container, .sidebar {
            width: 530px !important;
            height: 100vh !important;
            background: linear-gradient(145deg, rgba(23, 12, 43, 0.96), rgba(11, 6, 23, 0.98)) !important;
            padding: 24px 18px !important;
            box-sizing: border-box !important;
            box-shadow: 5px 0 25px rgba(0, 0, 0, 0.3) !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff !important;
            overflow-y: auto !important;
            z-index: 2000;
            backdrop-filter: blur(12px) !important;
            border-right: 1px solid rgba(255, 255, 255, 0.05) !important;
            position: fixed !important; /* ยึดไว้ฝั่งซ้ายของจอคอม */
            left: 0;
            top: 0;
            transition: all 0.3s ease;
        }

        /* ดันแผนที่หลบแผงซ้าย 320px */
        .map-container { 
            margin-left: 320px !important;
            width: calc(100% - 320px) !important; 
            height: 100vh !important; 
            transition: all 0.3s ease;
        }

        #map { 
            width: 100%; 
            height: 100%; 
        }

        /* 📄 ตกแต่งการ์ดและเส้นแบ่งด้านในแผง */
        .sidebar > div, .sidebar-container > div {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.06) !important;
            border-radius: 14px !important;
            padding: 14px 12px !important;
        }

        .sidebar hr, .sidebar-container hr {
            border: 0 !important;
            border-top: 1px solid rgba(255, 255, 255, 0.08) !important;
            margin: 14px 0 !important;
        }

        /* หัวข้อแอปเล่นสีส้ม-พีช */
        .sidebar-container h2, .sidebar h2, .sidebar-title {
            font-size: 23px !important;
            font-weight: 700 !important;
            letter-spacing: 0.5px !important;
            background: linear-gradient(45deg, #ff7b54, #ffcc80) !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            margin: 0 0 6px 0 !important;
            text-shadow: none !important;
        }

        .sidebar label, .sidebar-container label { 
            font-size: 13px !important; 
            color: rgba(255, 255, 255, 0.65) !important; 
            display: block;
            margin-top: 12px !important; 
        }

        /* 📝 ปรับแต่งช่องกรอกข้อมูล (ดักจับตัวหนังสือให้อ่านออกชัดเจน) */
        .sidebar input, 
        .sidebar select, 
        .sidebar button,
        .sidebar textarea,
        .sidebar-container input[type="text"],
        .sidebar-container input[type="number"],
        .sidebar-container select,
        .sidebar-container textarea { 
            width: 100% !important; 
            padding: 11px 12px !important; 
            margin-top: 6px !important; 
            margin-bottom: 14px !important; 
            border-radius: 12px !important; 
            border: 1px solid rgba(255,255,255,0.12) !important; 
            background: rgba(255, 255, 255, 0.04) !important; 
            color: #ffffff !important; /* 🔥 บังคับให้ฟอนต์เป็นสีขาวสว่างเสมอ */
            box-sizing: border-box !important; 
            font-size: 16px !important; 
            outline: none !important;
            transition: all 0.2s ease;
        }

        /* สีข้อความสำหรับช่อง Readonly */
        .sidebar input[readonly], .sidebar-container input[readonly] { 
            background: rgba(255,255,255,0.02) !important; 
            color: rgba(255, 255, 255, 0.5) !important; 
            border-color: rgba(255,255,255,0.06) !important;
        }

        .sidebar input:focus, .sidebar select:focus, .sidebar textarea:focus,
        .sidebar-container input:focus, .sidebar-container select:focus, .sidebar-container textarea:focus {
            border-color: rgba(255,123,84,0.6) !important;
            box-shadow: 0 0 0 3px rgba(255,123,84,0.12) !important;
            background: rgba(255,255,255,0.06) !important;
        }

        /* 🔘 ปุ่มส่งข้อมูล */
        .sidebar button,
        .sidebar-container button.submit-btn,
        .sidebar-container input[type="submit"] { 
            background: linear-gradient(90deg, #ff7b54, #ffcc80) !important; 
            color: #1a0a24 !important; 
            font-weight: 800 !important; 
            border: none !important; 
            cursor: pointer; 
            margin-top: 10px !important;
            box-shadow: 0 4px 12px rgba(255, 106, 66, 0.15) !important;
        }

        .sidebar button:hover, .sidebar-container button.submit-btn:hover { 
            filter: brightness(1.05) !important; 
            transform: translateY(-1px) !important;
            box-shadow: 0 6px 16px rgba(255, 106, 66, 0.3) !important;
        }

        /* กล่อง AI แชทด้านล่าง */
        .chat-box, .ai-agent-box { 
            background: rgba(255,255,255,0.02) !important; 
            padding: 12px !important; 
            border-radius: 12px !important; 
            height: 120px; 
            overflow-y: auto; 
            border: 1px solid rgba(255,255,255,0.08) !important; 
            font-size: 14px !important; 
            line-height: 1.5 !important; 
        }

        /* 🚨 กล่องแจ้งเหตุย่อย (Incident Feed Box) - สำหรับจอคอม */
        .incident-feed-panel {
            position: absolute;
            bottom: 20px;
            right: 20px; /* 👈 ย้ายมาอยู่มุมล่างขวาของแผนที่แทน */
            left: auto;  /* 👈 เคลียร์ค่าตำแหน่งฝั่งซ้ายเดิมออก */
            width: 350px; 
            max-height: 380px;
            background: linear-gradient(145deg, rgba(28, 14, 53, 0.95), rgba(15, 8, 32, 0.98)) !important;
            z-index: 3000;
            border-radius: 16px !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: none;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(10px);
        }

        /* 🔥 ซ่อน Scrollbar ของแผงแจ้งเหตุ สำหรับ Chrome, Safari, Opera, Brave */
        .incident-feed-panel::-webkit-scrollbar {
            display: none !important;
        }

        /* 🔥 ซ่อน Scrollbar ของช่องแชทบอท สำหรับ Chrome, Safari, Opera, Brave */
        .chat-box::-webkit-scrollbar, .ai-agent-box::-webkit-scrollbar {
            display: none !important;
        }

        .feed-content, #feedContent {
            padding: 12px !important;
            overflow-y: auto;
            color: rgba(255, 255, 255, 0.9) !important;
            flex-grow: 1;

            /* 🔥 ซ่อน Scrollbar ด้านในของ Feed Content สำหรับ Firefox และ IE/Edge */
            -ms-overflow-style: none !important;
            scrollbar-width: none !important;
        }

        /* 🔥 ซ่อน Scrollbar ด้านในของ Feed Content สำหรับ Chrome, Safari, Opera, Brave */
        .feed-content::-webkit-scrollbar, #feedContent::-webkit-scrollbar {
            display: none !important;
        }

        .feed-header {
            background: linear-gradient(90deg, #ff4d4d, #ff7b54) !important;
            color: white !important;
            padding: 12px 16px !important;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .feed-close-btn {
            background: none; border: none; color: white; font-size: 20px; cursor: pointer; opacity: 0.8;
        }

        .feed-content, #feedContent {
            padding: 12px !important;
            overflow-y: auto;
            color: rgba(255, 255, 255, 0.9) !important;
            flex-grow: 1;
        }

        /* 🎯 จัดการความดุดัน Leaflet Popup ให้มองเห็นง่าย */
        .leaflet-popup-content-wrapper {
            background: #1c0e35 !important;
            color: #ffffff !important;
            border-radius: 14px !important;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
        }
        .leaflet-popup-tip { background: #1c0e35 !important; }
        .leaflet-popup-close-button { color: #aaa !important; }

        /* บังคับสี Dropdown ตัวเลือกให้ไม่มืด */
        #hazard_type option, #risk_level option {
            background: #12051f !important;
            color: rgba(255,255,255,0.95) !important;
        }


/* 📱 ==========================================================================
   🛠️ โค้ดสำหรับหน้าจอมือถือ/แท็บเล็ต (Screen < 768px) - แบ่งครึ่งจอ 50/50
   ========================================================================== */
@media screen and (max-width: 768px) {
    body {
        display: flex !important;
        flex-direction: column !important;
        height: 100vh !important;
        margin: 0 !important;
        overflow: hidden !important;
    }
    .app-container, body {
        display: flex !important;
        flex-direction: column !important;
        height: 100vh !important;
        margin: 0;
    }

    .map-container {
        flex: 1 !important;
        width: 100% !important;
        height: 50vh !important;
        margin: 0 !important;
        left: 0 !important;
        position: relative !important;
        order: 1 !important;
    }

    #map {
        width: 100% !important;
        height: 100% !important;
        display: block !important;
    }

    .sidebar, .sidebar-container {
        order: 2 !important;
        flex: 0.6 !important;
        width: 100% !important;
        height: 50vh !important;
        overflow-y: auto !important;
        position: relative !important;
    }

    /* 🚨 ย้ายโค้ดเคลียร์หน้าต่างแจ้งเตือนของมือถือเข้ามาอยู่ในปีกกา media query ให้ถูกต้อง */
    .incident-feed-panel {
        position: fixed !important;
        left: 0 !important;
        bottom: 0 !important;
        width: 100% !important;
        height: 45vh !important;
        max-height: 45vh !important;
        border-radius: 16px 16px 0 0 !important;
        z-index: 9999 !important;
    }
}
    
    </style>
</head>
<body>

    <!-- โซนเมนูควบคุม และ AI Agent ด้านซ้ายมือ (ในมือถือจะอยู่ด้านล่าง) -->
    <div class="sidebar">
        <div>
            <h2>📣 Red Zone App</h2>
            <p style="font-size: 12px; color: #ffab91; margin-top: -10px;">เปลี่ยนความเงียบเป็นพลัง แจ้งเหตุคุกคามแบบ Anonymous</p>
            
            <label>🚨 ประเภทภัยคุกคามทางเพศ</label>
            <select id="hazard_type">
                <option value="อนาจาร">#อนาจาร (ทำอนาจาร/โชว์สิ่งไม่เหมาะสม)</option>
                <option value="สตอล์กเกอร์">#สตอล์กเกอร์ (สะกดรอยตาม/แอบถ่าย)</option>
                <option value="พื้นที่จุดอับ">#พื้นที่จุดอับ (ซอยเปลี่ยว/เสาไฟดับ)</option>
            </select>
            
            <label>📝 รายละเอียดเหตุการณ์ / ช่วงเวลาที่พบ</label>
            <input type="text" id="description" placeholder="เช่น เจอคนเดินตามช่วงสองทุ่ม, วินพูดจาลวนลาม">
            
            <label>📍 ละติจูด (Latitude)</label>
            <input type="text" id="lat" placeholder="จิ้มเลือกจุดบนแผนที่ด้านบน" readonly>
            
            <label>📍 ลองจิจูด (Longitude)</label>
            <input type="text" id="lng" placeholder="จิ้มเลือกจุดบนแผนที่ด้านบน" readonly>
            
            <label>⚠️ ระดับความอันตรายของพื้นที่</label>
            <select id="risk_level">
                <option value="Red">🔴 สีแดง (อันตรายมาก/เกิดเหตุสดๆ ร้อนๆ)</option>
                <option value="Yellow">🟡 สีเหลือง (พื้นที่เฝ้าระวัง/เคยมีรายงานประปราย)</option>
            </select>
            
            <button onclick="submitReport()">ส่งข้อมูลปักหมุดแผนที่</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #4a287a; margin: 20px 0;">

        <!-- ระบบ AI Agent พี่รุ้ง คอยรับเรื่อง -->
        <div>
            <h3 style="color: #ffcc80; margin-bottom: 8px; font-size: 15px;">🤖 AI Agent P Diddy (รับเรื่อง 24 ชม.)</h3>
            <div class="chat-box" id="chat-content"><b>P Diddy AI:</b> สวัสดีค่ะ มีเรื่องไม่สบายใจหรืออยากปรึกษาข้อกฎหมายไหมคะ? ข้อมูลของคุณจะถูกปิดเป็นความลับสูงสุดค่ะ</div>
            <input type="text" id="user-msg" placeholder="พิมพ์ข้อความเล่าเหตุการณ์ หรือถามกฎหมาย..." onkeypress="handleChat(event)">
        </div>
    </div>

    <!-- โซนแสดงแผนที่จริงด้านขวามือ (ในมือถือจะอยู่ด้านบนครึ่งจอ) -->
    <div class="map-container">
        <div id="map"></div>
    </div>

    <div id="incidentFeedPanel" class="incident-feed-panel">
        <div class="feed-header">
            <span id="feedTitle">📌 ข้อมูลพื้นที่แจ้งเหตุ</span>
            <button class="feed-close-btn" onclick="closeFeedPanel()">×</button>
        </div>
        <div id="feedContent" class="feed-content">
            </div>
    </div>


<!-- เรียกใช้ระบบแผนที่ Leaflet.js -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // กำหนดพิกัดแผนที่เริ่มต้นที่กรุงเทพฯ
        const map = L.map('map').setView([13.8284, 100.5284], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let currentMarker;
        let safetyCircles = []; // Array สำหรับเก็บวงกลมกลุ่มเสี่ยงเพื่อใช้เคลียร์ได้อย่างปลอดภัย

        // ดักจับการคลิก/จิ้มนิ้ว บนแผนที่เพื่อปักหมุด
        map.on('click', (e) => {
            document.getElementById('lat').value = e.latlng.lat.toFixed(6);
            document.getElementById('lng').value = e.latlng.lng.toFixed(6);
            
            if (currentMarker) map.removeLayer(currentMarker);
            currentMarker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
        });

        // 1. ดึงพิกัด และมัดรวมกลุ่มที่อยู่ใกล้กัน (Grouping) ก่อนวาดลงแผนที่
        function loadSafetyMap() {
            fetch('https://sa-projectxz.onrender.com/api/incidents')
                .then(res => res.json())
                .then(data => {
                    // ล้างวงกลมอันเก่าบนแผนที่ออกให้หมดก่อนวาดใหม่ (ป้องกันปัญหาวาดซับซ้อน)
                    safetyCircles.forEach(circle => map.removeLayer(circle));
                    safetyCircles = [];

                    const threshold = 0.0005; // ระยะมัดรวมกลุ่มพิกัดที่ใกล้กัน (ประมาณ 50 เมตร)
                    const groups = [];

                    // ทำการรวมกลุ่มข้อมูลที่อยู่ใกล้เคียงกัน
                    data.forEach(item => {
                        // แปลงเป็น Float ป้องกันบัคกรณีข้อมูลที่ส่งมาเป็น String
                        const lat = parseFloat(item.latitude);
                        const lng = parseFloat(item.longitude);

                        if (isNaN(lat) || isNaN(lng)) return; // ข้ามรายการที่พิกัดไม่สมบูรณ์

                        let foundGroup = groups.find(g => {
                            return Math.abs(g.latitude - lat) < threshold &&
                                   Math.abs(g.longitude - lng) < threshold;
                        });

                        if (foundGroup) {
                            foundGroup.items.push(item);
                            // ถ้าในกลุ่มมีใครแจ้งเตือนเป็นสีแดง (Red) ให้กลุ่มนั้นเป็นสีแดงตามไปด้วย
                            if (item.risk_level === 'Red') {
                                foundGroup.risk_level = 'Red';
                            }
                        } else {
                            groups.push({
                                latitude: lat,
                                longitude: lng,
                                risk_level: item.risk_level,
                                items: [item]
                            });
                        }
                    });

                    // วาดวงกลมกลุ่มละ 1 วง
                    groups.forEach(group => {
                        let zoneColor = group.risk_level === 'Red' ? '#ff0000' : '#ffcc00';
                        
                        let circle = L.circle([group.latitude, group.longitude], {
                            color: zoneColor,
                            fillColor: zoneColor,
                            fillOpacity: 0.3,
                            radius: 40 // รัศมีกลุ่ม
                        }).addTo(map);

                        safetyCircles.push(circle); // เก็บวงกลมไว้ใน Array

                        // พอกดคลิกที่กลุ่มวงกลมนี้ จะส่งข้อมูลทั้งกลุ่มไปโชว์ใน Feedbox
                        circle.on('click', function() {
                            showIncidentFeed(group, data); 
                        });
                    });
                })
                .catch(err => console.error('โหลดข้อมูลล้มเหลว:', err));
        }

        // 2. แสดง Feedbox รวบรวมเหตุการณ์ทั้งหมดในบริเวณพิกัดกลุ่มนั้น
        function showIncidentFeed(clickedGroup, allData) {
            const panel = document.getElementById('incidentFeedPanel');
            const content = document.getElementById('feedContent');
            const title = document.getElementById('feedTitle');
            const sidebar = document.querySelector('.sidebar');

            if (!panel || !content || !title || !sidebar) return;

            title.innerHTML = `🚨 รายการแจ้งเหตุในบริเวณนี้`;
            content.innerHTML = '';

            const threshold = 0.0005;
            const clickedLat = parseFloat(clickedGroup.latitude);
            const clickedLng = parseFloat(clickedGroup.longitude);

            // ดึงเหตุการณ์ทั้งหมดที่อยู่ใกล้เคียงพิกัดกลุ่มนี้มารวมกัน
            const recordsInThisArea = allData.filter(info => {
                const infoLat = parseFloat(info.latitude);
                const infoLng = parseFloat(info.longitude);
                return Math.abs(infoLat - clickedLat) < threshold && 
                       Math.abs(infoLng - clickedLng) < threshold;
            });

            // เรียงลำดับจากใหม่ไปเก่า (แสดงเหตุการณ์ล่าสุดขึ้นก่อน)
            recordsInThisArea.sort((a, b) => {
                return new Date(b.created_at || b.date || b.timestamp) - new Date(a.created_at || a.date || a.timestamp);
            });

            recordsInThisArea.forEach(info => {
                let timeSource = info.created_at || info.date || info.timestamp;
                let reportDate = timeSource ? new Date(timeSource).toLocaleString('th-TH') : 'ไม่ระบุวันเวลา';

                content.innerHTML += `
                    <div class="feed-item" style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-left: 4px solid rgba(255,123,84,0.95); padding: 10px; margin-bottom: 8px; border-radius: 10px; font-size: 13px; color: rgba(255,255,255,0.92); text-align: left;">
                        
                        <!-- แสดงประเภทภัยคุกคามแยกย่อยเฉพาะของเหตุการณ์นี้ในตัวการ์ด -->
                        <div style="display: inline-block; background: rgba(255, 123, 84, 0.15); color: #ffcc80; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-bottom: 8px; border: 1px solid rgba(255, 123, 84, 0.3);">
                            ⚠️ #${info.hazard_type || 'ทั่วไป'}
                        </div><br>
                        
                        <b style="color: rgba(255,204,128,0.95);">👤 ผู้แจ้ง:</b> ${info.user_alias || 'ไม่ประสงค์ออกนาม'}<br>
                        <b style="color: rgba(255,204,128,0.95);">📝 รายละเอียด:</b> ${info.description || 'ไม่มีรายละเอียด'}<br>
                        <small style="color: rgba(255,255,255,0.55);">📅 ${reportDate}</small>
                    </div>
                `;
            });

            // ถ้าเปิดในมือถือ ซ่อน sidebar เมื่อเปิด feed panel
            if (window.innerWidth <= 768) {
                sidebar.style.setProperty('display', 'none', 'important');
            }

            panel.style.display = 'flex';
        }

        function closeFeedPanel() {
            const panel = document.getElementById('incidentFeedPanel');
            const sidebar = document.querySelector('.sidebar');

            if (panel) panel.style.display = 'none';

            // คืน sidebar ในมือถือ
            if (window.innerWidth <= 768 && sidebar) {
                sidebar.style.setProperty('display', 'block', 'important');
            }
        }

        // ฟังก์ชันส่งข้อมูลการปักหมุดไปยังหลังบ้าน
        function submitReport() {
            const hazard_type = document.getElementById('hazard_type').value;
            const description = document.getElementById('description').value;
            const latitude = document.getElementById('lat').value;
            const longitude = document.getElementById('lng').value;
            const risk_level = document.getElementById('risk_level').value;

            if (!latitude || !longitude || !description) {
                Swal.fire({
                    title: 'กรุณากรอกรายละเอียดให้ครบถ้วน!',
                    text: 'กรุณาเลือกตำแหน่งบนแผนที่ และกรอกรายละเอียดให้ครบถ้วน!',
                    icon: 'warning',
                    confirmButtonText: 'ตกลง',
                    background: '#1a0a24',
                    color: '#ffffff',
                    confirmButtonColor: '#ff7b54'
                });
                return;
            }

            fetch('https://sa-projectxz.onrender.com/api/incidents', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ hazard_type, description, latitude, longitude, risk_level })
            })
            .then(res => res.json())
            .then(data => {
                Swal.fire({
                    title: 'บันทึกสำเร็จ!',
                    text: 'ระบบทำรายการ: บันทึกจุดเสี่ยงเรียบร้อย!',
                    icon: 'success',
                    confirmButtonText: 'ตกลง',
                    background: '#1a0a24',
                    color: '#ffffff',
                    confirmButtonColor: '#ff7b54'
                });
                document.getElementById('description').value = '';
                document.getElementById('lat').value = '';
                document.getElementById('lng').value = '';
                if (currentMarker) map.removeLayer(currentMarker);
                
                // สั่งโหลดหมุดใหม่ทันที
                loadSafetyMap();
            })
            .catch(err => {
                console.error(err);
                Swal.fire({
                    title: 'เกิดข้อผิดพลาด!',
                    text: 'เกิดข้อผิดพลาดในการส่งข้อมูลไปยัง Server!',
                    icon: 'error',
                    confirmButtonText: 'ตกลง',
                    background: '#1a0a24',
                    color: '#ffffff',
                    confirmButtonColor: '#ff7b54'
                });
            });
        }

        // ระบบจำลอง AI Agent สแกนคีย์เวิร์ด
function handleChat(e) {
    if (e.key === 'Enter') {
        const msg = document.getElementById('user-msg').value;
        if (!msg.trim()) return;

        const chatBox = document.getElementById('chat-content');
        chatBox.innerHTML += `<br><b style="color: #81c784;">คุณ:</b> ${msg}`;
        
        // แปลงข้อความให้เป็นตัวพิมพ์เล็กทั้งหมดเพื่อช่วยในการค้นหาภาษาอังกฤษ (ถ้ามี)
        const lowerMsg = msg.toLowerCase();
        let reply = "";

        // 🛠️ ฟังก์ชันช่วยตรวจจับคำสำคัญในข้อความ (แปลงเข้า Array เพื่อตรวจได้ทีละหลายคำ)
        const has = (keywords) => keywords.some(key => lowerMsg.includes(key));

        // 1. หมวด: ตกอยู่ในอันตรายฉุกเฉิน
        if (has(["ช่วยด้วย", "อันตราย", "กลัว", "โดนทำร้าย", "ฉุกเฉิน", "โดนปล้น", "มีอาวุธ"])) {
            reply = "🚨 **ตั้งสติก่อนนะคะ!** หากคุณอยู่ในสถานการณ์อันตรายในตอนนี้:<br>" +
                    "1. รีบเดินเข้าหาพื้นที่สว่าง ร้านสะดวกซื้อ หรือจุดที่มีคนพลุกพล่านทันที<br>" +
                    "2. โทรหาตำรวจที่เบอร์ **191** หรือมองหาผู้คนรอบข้างให้ช่วยเหลือ<br>" +
                    "3. พยายามแชร์โลเกชันปัจจุบันของคุณให้เพื่อนหรือครอบครัวทราบทันทีค่ะ!";
        }
        // 2. หมวด: โดนสะกดรอยตาม / เดินตาม
        else if (has(["เดินตาม", "ตาม", "สะกดรอย", "ดักรอ", "มองหน้าแปลกๆ", "จ้อง"])) {
            reply = "👣 **พฤติกรรมนี้เข้าข่ายการสะกดรอยตาม (#สตอล์กเกอร์)** แนะนำให้เดินกึ่งวิ่งเปลี่ยนเส้นทางไปทางที่มีแสงสว่างทันที อย่าเดินเข้าที่เปลี่ยวเด็ดขาด! " +
                    "และช่วยกดปักหมุดรายงานในระบบ Speak Up เพื่อแจ้งพิกัดและเตือนผู้ใช้คนอื่นๆ ที่อยู่แถวนี้ด้วยนะคะ[cite: 2]";
        }
        // 3. หมวด: โดนลวนลาม / ทำอนาจาร
        else if (has(["จับ", "ลวนลาม", "อนาจาร", "โชว์", "แก้ผ้า", "จับก้น", "จับหน้าอก", "แตะอั๋ง"])) {
            reply = "🔞 **นี่คือการคุกคามทางเพศและอนาจาร!** หากตอนนี้น้องพ้นขีดอันตรายแล้ว แนะนำให้จดจำลักษณะเด่นของคนร้าย (เช่น สีเสื้อ, ส่วนสูง, รอยสัก) " +
                    "หรือถ่ายรูป/วิดีโอไว้หากทำได้อย่างปลอดภัย และปักหมุดจุดเกิดเหตุบนแผนที่ทันที เพื่อให้เพื่อนๆ ในพื้นที่ระวังตัวเพิ่มขึ้นค่ะ[cite: 2]";
        }
        // 4. หมวด: แหล่งมืด / จุดอับสายตา
        else if (has(["มืด", "เปลี่ยว", "จุดอับ", "ไม่มีไฟ", "ซอยมืด", "ร้าง", "น่ากลัว", "กล้องเสีย"])) {
            reply = "💡 **พบพื้นที่จุดอับสายตาใช่ไหมคะ?** รบกวนช่วยส่งรายงานปักหมุดหมวดหมู่ **#พื้นที่จุดอับ** บนแผนที่ให้หน่อยนะคะ " +
                    "พิกัดที่คุณปักเข้ามาจะเป็นประโยชน์อย่างมากในการช่วยผลักดันให้หน่วยงานเข้าตรวจสอบ ติดกล้องวงจรปิด หรือเพิ่มเสาไฟส่องสว่างค่ะ";
        }
        // 5. หมวด: แอบถ่าย / ถ้ำมอง
        else if (has(["แอบถ่าย", "กล้อง", "ถ้ำมอง", "แอบดู", "ห้องน้ำ"])) {
            reply = "📸 **เตือนภัยการแอบถ่าย/ถ้ำมอง!** หากพบอุปกรณ์ต้องสงสัยหรือพฤติกรรมถ้ำมองในห้องน้ำสาธารณะหรือมุมตึก " +
                    "ให้รีบแจ้งเจ้าหน้าที่ดูแลสถานที่นั้นทันที และทำสัญลักษณ์ปักหมุดบนแผนที่ Speak Up เพื่อแจ้งเตือนคนอื่นให้เลี่ยงจุดดังกล่าวค่ะ[cite: 2]";
        }
        // 6. หมวด: ข้อกฎหมาย และการดำเนินคดี
        else if (has(["แจ้งความ", "กฎหมาย", "ตำรวจ", "มาตรา", "ฟ้อง", "จับไหม", "แจ้งจับ"])) {
            reply = "⚖️ **เกร็ดความรู้ทางกฎหมายเบื้องต้น:**<br>" +
                    "- **การกระทำอนาจารต่อหน้าธารกำนัล (ม.388):** มีโทษปรับไม่เกิน 5,000 บาท<br>" +
                    "- **การคุกคามหรือรังแกให้ได้รับความอับอาย/เดือดร้อนรำคาญ (ม.397):** มีโทษปรับไม่เกิน 5,000 บาท " +
                    "(แต่หากเป็นการคุกคามทางเพศในที่สาธารณะ มีโทษจำคุกไม่เกิน 1 เดือน หรือปรับไม่เกิน 10,000 บาท หรือทั้งจำทั้งปรับ)<br>" +
                    "แนะให้รวบรวมหลักฐานและพิกัดรายงานจากแอปเราไปใช้เป็นข้อมูลแจ้งความได้เลยค่ะ!";
        }
        // 7. หมวด: สายด่วนสำคัญ
        else if (has(["เบอร์", "โทร", "เบอร์ฉุกเฉิน", "ติดต่อ", "สายด่วน", "เบอร์โทร"])) {
            reply = "📞 **สายด่วนช่วยเหลือฉุกเฉินที่คุณควรบันทึกไว้:**<br>" +
                    "- เหตุด่วนเหตุร้าย: **191**<br>" +
                    "- ศูนย์ช่วยเหลือสังคม (พม.): **1300** (แจ้งเหตุคุกคามทางเพศ/ความรุนแรง)<br>" +
                    "- ตำรวจท่องเที่ยว: **1155**<br>" +
                    "- สายด่วนกองปราบปราม: **1195**";
        }
        // 8. หมวด: ทักทายเริ่มต้น
        else if (has(["สวัสดี", "หวัดดี", "ดีครับ", "ดีค่ะ", "hi", "hello"])) {
            reply = "สวัสดีค่ะ! P Diddy AI ยินดีช่วยเหลือและคอยดูแลความปลอดภัยให้คุณค่ะ วันนี้มีพฤติกรรมไม่น่าไว้วางใจหรือพื้นที่เสี่ยงตรงไหนอยากปรึกษาไหมคะ?";
        }
        // 9. หมวด: ขอบคุณ
        else if (has(["ขอบคุณ", "ขอบใจ", "ดีมาก", "เยี่ยม", "thanks", "thank you"])) {
            reply = "ด้วยความยินดีอย่างยิ่งค่ะ! ขอให้เดินทางปลอดภัยในทุกเส้นทางนะคะ อย่าลืมส่องแผนที่ Speak Up บ่อยๆ เพื่อหลีกเลี่ยงพื้นที่เสี่ยงภัยรอบตัวนะคะ 💖[cite: 2]";
        }
        // 10. Easter Egg: ข้อความสุดกวนดักไอดีดดี้ (มุกเดิมของคุณ)
        else if (has(["p diddy", "ai", "AI", "บอท", "บ๊อท"])) {
            reply = "เป็น ส้นตีนไรละ เเล้วทำไม?";
        }
        // 11. ตรวจพบสรรพนามทั่วไป (ให้วนกลับไปถามพฤติกรรม)
        else if (has(["ครับ", "ผม", "ค่ะ", "ฉัน"])) {
            reply = "P Diddy รับฟังอยู่นะคะ ข้อมูลทุกอย่างจะปลอดภัยและไม่ระบุตัวตนแน่นอนค่ะ มีพฤติกรรมไหนที่ทำให้คุณรู้สึกไม่ปลอดภัยไหมคะ?[cite: 2, 7]";
        }
        // 12. Fallback (มุกเดิมของคุณ)
        else {
            reply = "อ่ะล้อเล่นนนนนนนนน";
        }

        // แสดงข้อความตอบกลับหลังจากผ่านไป 0.7 วินาที เพื่อความเป็นธรรมชาติ
        setTimeout(() => {
            chatBox.innerHTML += `<br><span style="color:#ffcc80"><b>P Diddy AI:</b> ${reply}</span>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 700);
        
        document.getElementById('user-msg').value = '';
    }
}

        // สั่งรันโหลดแผนที่ทันทีเมื่อโครงสร้างเว็บพร้อมทำงาน

            loadSafetyMap();
        });
    </script>
